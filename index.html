<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <style>
    body { margin:0; font-family:'Segoe UI',sans-serif; background:#36393f; color:white; display:flex; height:100vh; }
    .sidebar { width:240px; background:#2f3136; padding:15px; display:flex; flex-direction:column; }
    .sidebar h3 { color:#8e9297; font-size:12px; margin-bottom:10px; text-transform:uppercase; }
    .channel { padding:6px 10px; border-radius:4px; cursor:pointer; color:#b9bbbe; transition:.15s; }
    .channel:hover { background:#40444b; color:white; }
    .edit-profile { margin-top:auto; background:#40444b; text-align:center; padding:8px; border-radius:4px; cursor:pointer; }
    .edit-profile:hover { background:#5865f2; }
    .chat { flex:1; display:flex; flex-direction:column; }
    .header { padding:15px; background:#2f3136; font-weight:bold; border-bottom:1px solid #202225; }
    .messages { flex:1; padding:20px; overflow-y:auto; }
    .message { margin-bottom:10px; }
    .message-row { display:flex; align-items:flex-start; gap:8px; }
    .avatar { width:32px; height:32px; border-radius:50%; object-fit:cover; background:#5865f2; flex-shrink:0; margin-top:2px; border:1px solid rgba(255,255,255,0.15); }
    .message-content { line-height:1.35; }
    .username { font-weight:bold; cursor:pointer; color:#7289da; }
    .username:hover { text-decoration:underline; }
    .input-area { padding:10px 15px; background:#40444b; display:flex; }
    input { flex:1; padding:10px; border-radius:4px; border:none; background:#303339; color:white; }
    button { margin-left:10px; padding:10px 16px; border-radius:4px; border:none; background:#7289da; color:white; cursor:pointer; }
    .typing-indicator { font-size:12px; color:#b9bbbe; margin-left:5px; font-style:italic; }
    .mute-status { color:#ff6b6b; font-weight:bold; }
    button.shop-btn { background:#43b581; margin:5px 0; padding:8px 16px; }
    button.shop-btn:hover { background:#3da674; }

    .profile-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .profile-modal {
      width: 360px;
      max-width: calc(100vw - 30px);
      background: #2f3136;
      border: 1px solid #202225;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .profile-modal h3 { margin: 0 0 12px; font-size: 18px; }

    .profile-field { margin-bottom: 12px; }

    .profile-field label {
      display: block;
      margin-bottom: 6px;
      color: #ddd;
      font-size: 14px;
    }

    .profile-field input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: #40444b;
      color: white;
      outline: none;
    }

    .profile-field input[type="file"] {
      width: 100%;
      box-sizing: border-box;
      color: white;
      background: transparent;
      padding: 6px 0;
    }

    .profile-preview {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      display: none;
      margin-top: 10px;
      border: 2px solid #7289da;
      background: #5865f2;
    }

    .profile-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .profile-actions button {
      flex: 1;
      margin-left: 0;
    }

    .cancel-btn { background: #555; }
    .cancel-btn:hover { background: #666; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h3>TEXT CHANNELS</h3>
    <div class="channel" onclick="switchChannel('general')"># general</div>
    <div class="channel" onclick="switchChannel('gaming')"># gaming</div>
    <div class="channel" onclick="switchChannel('coding')"># coding</div>
    <div class="channel" onclick="switchChannel('stats')"># stats</div>
    <div class="channel" onclick="switchChannel('shop')"># shop</div>
    <div class="edit-profile" onclick="openProfileEditor()">⚙ Edit Profile</div>
  </div>

  <div class="chat">
    <div class="header" id="channelName"># general</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input id="messageInput" placeholder="Message #general" />
      <button onclick="sendMessage()">Send</button>
    </div>
    <div id="typingIndicator" class="typing-indicator"></div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    (async () => {
      const supabase = createClient(
        "https://adrusttuicogkeplrcac.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkcnVzdHR1aWNvZ2tlcGxyY2FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5NDQxMjUsImV4cCI6MjA4NjUyMDEyNX0.XnfYHjY0lR5JMBX855xsOtiC44oOW_bRtZbGmSo8ZB0"
      );

      const BUCKET_NAME = "profile-pictures";

      let username = localStorage.getItem("username") || "";
      let currentChannel = "general";

      if (!username) {
        while (!username) username = prompt("Enter username:");
        localStorage.setItem("username", username);
      }

      async function ensureProfileBucket() {
        const { data: buckets, error } = await supabase.storage.listBuckets();
        if (error) throw error;

        const bucket = (buckets || []).find(b => b.name === BUCKET_NAME);
        if (!bucket) throw new Error(`Bucket ${BUCKET_NAME} does not exist`);
        if (!bucket.public) throw new Error(`Bucket ${BUCKET_NAME} exists but is not public`);
      }

      await supabase.from("profiles").upsert({
        username,
        bio: "",
        xp: 0,
        level: 1,
        coins: 0,
        owned_snake: false,
        owned_slope: false,
        muted_until: null,
        mute_reason: null,
        profile_picture: null
      }, { onConflict: "username" });

      function getFallbackAvatar(name) {
        return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=7289da&color=fff&rounded=true&size=64`;
      }

      function setAvatarFallback(img, fallbackName) {
        img.onerror = () => {
          img.onerror = null;
          img.src = getFallbackAvatar(fallbackName);
        };
      }

      function addMessage(usernameText, messageText, avatarUrl = null) {
        const div = document.createElement("div");
        div.className = "message";
        const src = avatarUrl || getFallbackAvatar(usernameText);
        div.innerHTML = `
          <div class="message-row">
            <img class="avatar" src="${src}" alt="avatar">
            <div class="message-content">
              <span class="username">${usernameText}</span> ${messageText}
            </div>
          </div>
        `;
        const avatar = div.querySelector(".avatar");
        setAvatarFallback(avatar, usernameText);
        const container = document.getElementById("messages");
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
      }

      async function loadMessagesForChannel(channel) {
        const container = document.getElementById("messages");
        container.innerHTML = "Loading messages...";

        const { data, error } = await supabase
          .from("messages")
          .select("*")
          .eq("channel", channel)
          .order("created_at", { ascending: true });

        container.innerHTML = "";

        if (error || !data) {
          addMessage("System", "Could not load messages.");
          return;
        }

        const usernames = [...new Set(data.map(msg => msg.username))];
        const { data: profiles } = await supabase
          .from("profiles")
          .select("username, profile_picture")
          .in("username", usernames);

        const profileMap = {};
        (profiles || []).forEach(p => {
          profileMap[p.username] = p.profile_picture;
        });

        data.forEach((msg) => addMessage(msg.username, msg.text, profileMap[msg.username] || null));
      }

      async function sendMessage() {
        const input = document.getElementById("messageInput");
        const text = input.value.trim();
        if (!text) return;

        if (currentChannel === "stats" || currentChannel === "shop") {
          alert("You cannot send messages in this channel!");
          return;
        }

        const { data: profile } = await supabase
          .from("profiles")
          .select("muted_until, mute_reason")
          .eq("username", username)
          .single();

        if (profile?.muted_until !== null) {
          alert(`You are muted and cannot send messages!\n\nReason: ${profile.mute_reason || "No reason specified"}`);
          return;
        }

        const { error } = await supabase
          .from("messages")
          .insert({ channel: currentChannel, username, text });

        if (error) {
          alert("Failed to send message.");
          return;
        }

        input.value = "";
        await loadMessagesForChannel(currentChannel);
      }

      async function loadStats() {
        const container = document.getElementById("messages");
        container.innerHTML = "Loading stats...";

        const { data: profile, error } = await supabase
          .from("profiles")
          .select("username,xp,level,coins,owned_snake,owned_slope,muted_until,mute_reason,profile_picture")
          .eq("username", username)
          .single();

        container.innerHTML = "";

        if (error || !profile) {
          addMessage("System", "Could not load stats.");
          return;
        }

        const xpToNext = profile.level * 100 - profile.xp;
        const isMuted = profile.muted_until !== null;
        const muteStatus = isMuted
          ? `<span class="mute-status">🔇 MUTED (until cleared)<br><em>${profile.mute_reason || "No reason specified"}</em></span>`
          : "✅ Not muted";

        const statsDiv = document.createElement("div");
        statsDiv.className = "message";
        statsDiv.innerHTML = `
          <div class="message-row">
            <img class="avatar" src="${profile.profile_picture || getFallbackAvatar(profile.username)}" alt="avatar">
            <div class="message-content">
              <strong>👤 ${profile.username}</strong><br>
              <strong>⭐ Level:</strong> ${profile.level}<br>
              <strong>⚡ XP:</strong> ${profile.xp}<br>
              <strong>XP to next level:</strong> ${xpToNext}<br>
              <strong>💰 Coins:</strong> ${profile.coins}<br>
              <strong>🐍 Owns Snake:</strong> ${profile.owned_snake ? "Yes" : "No"}<br>
              <strong>📈 Owns Slope:</strong> ${profile.owned_slope ? "Yes" : "No"}<br>
              <strong>🔇 Mute Status:</strong> ${muteStatus}
            </div>
          </div>
        `;
        const avatar = statsDiv.querySelector(".avatar");
        setAvatarFallback(avatar, profile.username);
        container.appendChild(statsDiv);
      }

      function createSnakeOverlay() {
        let overlay = document.getElementById("snake-fullscreen-overlay");
        if (overlay) return overlay;

        overlay = document.createElement("div");
        overlay.id = "snake-fullscreen-overlay";
        overlay.style.cssText = `
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background: rgba(0, 0, 0, 0.9);
          z-index: 9999;
          overflow: hidden;
        `;

        const closeBtn = document.createElement("button");
        closeBtn.textContent = "❌";
        closeBtn.style.cssText = `
          position: absolute;
          top: 8px;
          right: 15px;
          width: 40px;
          height: 40px;
          border-radius: 50%;
          border: none;
          cursor: pointer;
          background: #7289da;
          color: white;
          font-size: 20px;
          font-weight: bold;
          z-index: 10000;
          display: flex;
          align-items: center;
          justify-content: center;
        `;
        closeBtn.onclick = () => overlay.remove();

        const frame = document.createElement("iframe");
        frame.src = "https://frogdafish.github.io/Snek";
        frame.style.cssText = `
          position: absolute;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          border: none;
          display: block;
        `;

        overlay.appendChild(closeBtn);
        overlay.appendChild(frame);
        document.body.appendChild(overlay);
        return overlay;
      }

      function createSlopeOverlay() {
        let overlay = document.getElementById("slope-fullscreen-overlay");
        if (overlay) return overlay;

        overlay = document.createElement("div");
        overlay.id = "slope-fullscreen-overlay";
        overlay.style.cssText = `
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background: rgba(0, 0, 0, 0.9);
          z-index: 9999;
          overflow: hidden;
        `;

        const closeBtn = document.createElement("button");
        closeBtn.textContent = "❌";
        closeBtn.style.cssText = `
          position: absolute;
          top: 8px;
          right: 15px;
          width: 40px;
          height: 40px;
          border-radius: 50%;
          border: none;
          cursor: pointer;
          background: #7289da;
          color: white;
          font-size: 20px;
          font-weight: bold;
          z-index: 10000;
          display: flex;
          align-items: center;
          justify-content: center;
        `;
        closeBtn.onclick = () => overlay.remove();

        const frame = document.createElement("iframe");
        frame.src = "slope.html";
        frame.style.cssText = `
          position: absolute;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          border: none;
          display: block;
        `;

        overlay.appendChild(closeBtn);
        overlay.appendChild(frame);
        document.body.appendChild(overlay);
        return overlay;
      }

      function openSnakeFullscreen() { createSnakeOverlay(); }
      function openSlopeFullscreen() { createSlopeOverlay(); }

      async function loadShop() {
        const container = document.getElementById("messages");
        container.innerHTML = "Loading shop...";

        const { data: profile } = await supabase
          .from("profiles")
          .select("coins, owned_snake, owned_slope")
          .eq("username", username)
          .single();

        container.innerHTML = "";

        const snakeDiv = document.createElement("div");
        snakeDiv.className = "message";
        snakeDiv.style.marginBottom = "20px";
        snakeDiv.innerHTML = profile?.owned_snake ? `
          <strong>🐍 Snake Game</strong><br>
          Play the classic Snake game!<br>
          <button id="playSnakeBtn" class="shop-btn">Play Snake (Fullscreen)</button>
        ` : `
          <strong>🐍 Snake Game</strong><br>
          Play the classic Snake game! Cost: 25 coins<br>
          <button id="buySnakeBtn" class="shop-btn">Buy Snake (25 coins)</button>
        `;
        container.appendChild(snakeDiv);

        const slopeDiv = document.createElement("div");
        slopeDiv.className = "message";
        slopeDiv.innerHTML = profile?.owned_slope ? `
          <strong>📈 Slope Game</strong><br>
          Fast-paced endless runner down a slope!<br>
          <button id="playSlopeBtn" class="shop-btn">Play Slope (Fullscreen)</button>
        ` : `
          <strong>📈 Slope Game</strong><br>
          Fast-paced endless runner down a slope! Cost: 50 coins<br>
          <button id="buySlopeBtn" class="shop-btn">Buy Slope (50 coins)</button>
        `;
        container.appendChild(slopeDiv);

        if (profile?.owned_snake) {
          document.getElementById("playSnakeBtn").onclick = openSnakeFullscreen;
        } else {
          document.getElementById("buySnakeBtn").onclick = async () => {
            const { data: p } = await supabase
              .from("profiles")
              .select("coins, owned_snake")
              .eq("username", username)
              .single();
            if (!p) return;
            if (p.owned_snake) return loadShop();
            if (p.coins < 25) return alert("You need 25 coins to buy Snake!");

            const { error } = await supabase
              .from("profiles")
              .update({ coins: p.coins - 25, owned_snake: true })
              .eq("username", username);

            if (error) return alert("Purchase failed.");
            alert("You bought Snake! Opening...");
            openSnakeFullscreen();
            await loadShop();
          };
        }

        if (profile?.owned_slope) {
          document.getElementById("playSlopeBtn").onclick = openSlopeFullscreen;
        } else {
          document.getElementById("buySlopeBtn").onclick = async () => {
            const { data: p } = await supabase
              .from("profiles")
              .select("coins, owned_slope")
              .eq("username", username)
              .single();
            if (!p) return;
            if (p.owned_slope) return loadShop();
            if (p.coins < 50) return alert("You need 50 coins to buy Slope!");

            const { error } = await supabase
              .from("profiles")
              .update({ coins: p.coins - 50, owned_slope: true })
              .eq("username", username);

            if (error) return alert("Purchase failed.");
            alert("You bought Slope! Opening...");
            openSlopeFullscreen();
            await loadShop();
          };
        }
      }

      async function uploadProfileImage(file) {
        await ensureProfileBucket();

        const ext = (file.name.split(".").pop() || "png").toLowerCase();
        const path = `profiles/${username}-${Date.now()}.${ext}`;

        const { error: uploadError } = await supabase.storage
          .from(BUCKET_NAME)
          .upload(path, file, {
            cacheControl: "3600",
            upsert: true,
            contentType: file.type || "image/png"
          });

        if (uploadError) throw uploadError;

        const { data } = supabase.storage
          .from(BUCKET_NAME)
          .getPublicUrl(path);

        return data.publicUrl;
      }

      async function openProfileEditor() {
        const { data: profile } = await supabase
          .from("profiles")
          .select("username, profile_picture")
          .eq("username", username)
          .single();

        const overlay = document.createElement("div");
        overlay.className = "profile-overlay";
        overlay.innerHTML = `
          <div class="profile-modal">
            <h3>Edit Profile</h3>

            <div class="profile-field">
              <label for="profileUsername">Username</label>
              <input id="profileUsername" type="text" value="${profile?.username || username}" />
            </div>

            <div class="profile-field">
              <label for="profileFile">Profile Picture</label>
              <input id="profileFile" type="file" accept="image/*" />
              <img id="profilePreview" class="profile-preview" src="${profile?.profile_picture || ""}" alt="Preview">
            </div>

            <div class="profile-actions">
              <button id="saveProfileBtn">Save</button>
              <button id="cancelProfileBtn" class="cancel-btn">Cancel</button>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);

        const fileInput = document.getElementById("profileFile");
        const preview = document.getElementById("profilePreview");

        if (profile?.profile_picture) preview.style.display = "block";
        setAvatarFallback(preview, profile?.username || username);

        fileInput.addEventListener("change", () => {
          const file = fileInput.files?.[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            preview.src = reader.result;
            preview.style.display = "block";
          };
          reader.readAsDataURL(file);
        });

        document.getElementById("cancelProfileBtn").onclick = () => overlay.remove();

        document.getElementById("saveProfileBtn").onclick = async () => {
          try {
            const newUsername = document.getElementById("profileUsername").value.trim();
            const file = fileInput.files?.[0];

            let newProfilePicture = profile?.profile_picture || null;
            if (file) {
              newProfilePicture = await uploadProfileImage(file);
            }

            const updates = { profile_picture: newProfilePicture };

            if (newUsername && newUsername !== username) {
              updates.username = newUsername;
            }

            const { error } = await supabase
              .from("profiles")
              .update(updates)
              .eq("username", username);

            if (error) {
              alert("Failed to update profile.");
              return;
            }

            if (newUsername && newUsername !== username) {
              username = newUsername;
              localStorage.setItem("username", username);
            }

            overlay.remove();
            alert("Profile updated!");

            if (currentChannel === "stats") await loadStats();
            if (currentChannel === "general" || currentChannel === "coding" || currentChannel === "gaming") {
              await loadMessagesForChannel(currentChannel);
            }
          } catch (e) {
            alert(e.message || "Upload failed. Make sure the bucket exists and is public.");
          }
        };
      }

      function switchChannel(channel) {
        currentChannel = channel;
        document.getElementById("channelName").innerText =
          channel === "stats" ? "# stats" :
          channel === "shop" ? "# shop" :
          "# " + channel;

        const input = document.getElementById("messageInput");
        input.placeholder =
          channel === "stats" || channel === "shop" ? "" : "Message #" + channel;

        document.getElementById("messages").innerHTML = "";

        if (channel === "stats") loadStats();
        else if (channel === "shop") loadShop();
        else loadMessagesForChannel(channel);
      }

      window.sendMessage = sendMessage;
      window.switchChannel = switchChannel;
      window.openProfileEditor = openProfileEditor;
      window.openSnakeFullscreen = openSnakeFullscreen;
      window.openSlopeFullscreen = openSlopeFullscreen;

      document.getElementById("messageInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      await loadMessagesForChannel(currentChannel);
    })();
  </script>
</body>
</html>
